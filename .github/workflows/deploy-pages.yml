name: GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: GitHub-Pages-Ausgabe bauen
        run: npm run build

      - name: GitHub Pages einrichten
        uses: actions/configure-pages@v5

      - name: Seitenartefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Veröffentlichen
        id: deployment
        uses: actions/deploy-pages@v4
